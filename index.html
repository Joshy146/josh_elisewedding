<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joshua & Elise | Wedding</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <style>
        :root { --burgundy: #8B0000; --deep-black: #0a0a0a; --dark-grey: #2d2d2d; }
        body { background-color: var(--deep-black); color: #e0e0e0; font-family: 'Georgia', serif; margin: 0; text-align: center; }
        
        .hero { padding: 60px 20px; background: linear-gradient(to bottom, #1a0000, #000); }
        h1 { color: var(--burgundy); font-size: 3.5rem; text-shadow: 2px 2px 4px #000; }
        
        .counter-box { font-size: 1.5rem; margin: 20px; padding: 20px; border: 1px solid var(--burgundy); display: inline-block; background: rgba(139, 0, 0, 0.1); }
        #counter { color: var(--burgundy); font-weight: bold; }

        .swiper { width: 100%; max-width: 600px; height: 500px; margin: 30px auto; }
        .swiper-slide img { width: 100%; height: 100%; object-fit: contain; background: #000; }

        .details-container { padding: 40px; border-top: 2px solid var(--burgundy); border-bottom: 2px solid var(--burgundy); margin: 40px auto; max-width: 600px; }
        
        /* Color Palette Grid */
        .palette-container { display: flex; justify-content: center; gap: 20px; margin: 20px 0; }
        .color-circle { width: 80px; height: 80px; border-radius: 50%; border: 2px solid #fff; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: bold; }

        /* RSVP Button with Pulse Effect */
        .button { 
            background-color: var(--burgundy); color: white; padding: 20px 40px; 
            text-decoration: none; display: inline-block; margin: 40px; font-weight: bold; 
            transition: 0.3s; animation: pulse 2s infinite ease-in-out; 
        }

        /* Reduced swing for header */
        .swing { animation: swing 3s infinite ease-in-out; transform-origin: top center; display: inline-block; }
        @keyframes swing { 0%, 100% { transform: rotate(-3deg); } 50% { transform: rotate(3deg); } }
        
        /* Pulse animation for button */
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
    </style>
</head>
<body>

    <header class="hero">
        <h1 class="swing">Joshua & Elise</h1>
        <p>You are cordially invited to our special day</p>
        <div class="counter-box">Guests Attending: <span id="counter">Loading...</span></div>
    </header>

    <div class="swiper">
        <div class="swiper-wrapper">
            <div class="swiper-slide"><img src="photo1.png" alt="Photo 1"></div>
            <div class="swiper-slide"><img src="photo2.png" alt="Photo 2"></div>
            <div class="swiper-slide"><img src="photo3.png" alt="Photo 3"></div>
            <div class="swiper-slide"><img src="photo4.png" alt="Photo 4"></div>
            <div class="swiper-slide"><img src="photo5.png" alt="Photo 5"></div>
        </div>
    </div>

    <section class="details-container">
        <h2>The Details</h2>
        <p><strong>When:</strong> November 29, 2026 | 4PM - 11PM CST</p>
        <p><strong>Where:</strong> 123 Sesame Street, Livingston, Louisiana</p>
        <p><strong>Dress Code:</strong> Casual. Please wear our requested moody colors:</p>
        
        <div class="palette-container">
            <div class="color-circle" style="background-color: #483C32;">Taupe</div>
            <div class="color-circle" style="background-color: #000080;">Navy</div>
            <div class="color-circle" style="background-color: #708090;">Slate</div>
        </div>
    </section>

    <a href="https://forms.gle/mHS7KcxBKwCYyH6N7" class="button">RSVP NOW</a>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const swiper = new Swiper('.swiper', { loop: true, autoplay: { delay: 2500 } });
        fetch('https://docs.google.com/spreadsheets/d/e/2PACX-1vRJW3X-qPJVCHRSdm4ttODJ1k-wwwIY-HzmBBxtGk89h3dLYz_cxeUwzJN5vwFpur6hz0uYWIQlisCt/pub?output=csv')
            .then(res => res.text()).then(data => { document.getElementById('counter').innerText = data.split('\n').length - 1; });
    </script>
</body>
</html>
