<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joshua & Elise | Wedding</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <style>
        :root {
            --black: #000000;
            --burgundy: #8B0000;
            --deep-red: #A50000;
            --dark-grey: #5A5A5A;
            --light-grey: #9FA4A1;
        }

        body { background-color: var(--black); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; }
        
        /* Hero */
        .hero { padding: 100px 20px; }
        h1 { color: var(--burgundy); font-size: 3rem; }

        /* Carousel */
        .swiper { width: 100%; max-width: 600px; height: 400px; }
        .swiper-slide img { width: 100%; height: 100%; object-fit: cover; }

        /* Flip Cards */
        .card-container { display: flex; justify-content: center; gap: 20px; padding: 50px; flex-wrap: wrap; }
        .flip-card { width: 300px; height: 200px; perspective: 1000px; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .flip-card:hover .flip-card-inner { transform: rotateY(180deg); }
        .flip-card-front, .flip-card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; padding: 20px; border: 2px solid var(--burgundy); }
        .flip-card-front { background-color: var(--dark-grey); }
        .flip-card-back { background-color: var(--burgundy); transform: rotateY(180deg); }

        /* Dropdown */
        .dropdown { position: relative; display: inline-block; margin-top: 20px; }
        .dropdown-content { display: none; background-color: var(--dark-grey); padding: 15px; border: 1px solid var(--burgundy); }
        .dropdown:hover .dropdown-content { display: block; }

        .button { background-color: var(--burgundy); color: white; padding: 15px 30px; text-decoration: none; display: inline-block; margin-top: 30px; font-weight: bold; }
    </style>
</head>
<body>

    <header class="hero">
        <h1>Joshua Mansfield & Elise Autrey</h1>
        <p>Save the Date: Our Future Begins</p>
    </header>

    <!-- Image Carousel -->
    <div class="swiper">
        <div class="swiper-wrapper">
            <div class="swiper-slide"><img src="https://via.placeholder.com/600x400" alt="Us"></div>
            <div class="swiper-slide"><img src="https://via.placeholder.com/600x400" alt="Us"></div>
        </div>
    </div>

    <!-- About Dropdown -->
    <div class="dropdown">
        <button>About Us ▼</button>
        <div class="dropdown-content">
            <p>Established December 5th, 2025.</p>
        </div>
    </div>

    <!-- Flip Cards -->
    <div class="card-container">
        <div class="flip-card">
            <div class="flip-card-inner">
                <div class="flip-card-front"><h3>Dress Code</h3></div>
                <div class="flip-card-back"><p>Formal. Colors: Burgundy, Black, and Grey.</p></div>
            </div>
        </div>
    </div>

    <section>
        <h2>RSVP</h2>
        <a href="YOUR_GOOGLE_FORM_LINK_HERE" class="button">Confirm Attendance</a>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const swiper = new Swiper('.swiper', { loop: true, autoplay: { delay: 3000 } });
    </script>
</body>
</html>
